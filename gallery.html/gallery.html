<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0f0f0f;
    color: white;
}

/* Header */
header {
    background: black;
    padding: 15px 20px;
    position: relative;
}

/* Logo */
.logo {
    font-size: 24px;
    font-weight: bold;
    color: #b026ff;
}

/* Hamburger */
.menu-toggle {
    font-size: 30px;
    cursor: pointer;
    color: #b026ff;
    position: absolute;
    right: 20px;
    top: 10px;
}

/* Navigation */
nav {
    display: none;
    flex-direction: column;
    background: #1a1a1a;
    padding: 10px 0;
}

nav a {
    color: white;
    text-decoration: none;
    padding: 12px 20px;
    border-bottom: 1px solid #333;
}

nav a:hover {
    background: #b026ff;
}

/* Button style for nav links */
.nav-button {
    background: #b026ff;
    color: white;
    padding: 8px 14px;
    border-radius: 6px;
    margin: 6px;
    display: inline-block;
    text-decoration: none;
}

.nav-button:hover {
    background: #8c1fcc;
}

/* Desktop View */
@media (min-width: 768px) {
    nav {
        display: flex !important;
        flex-direction: row;
        justify-content: flex-end;
    }

    .menu-toggle {
        display: none;
    }

    nav a {
        border: none;
    }
}
</style>
</head>
<body>

<header>
    <div class="logo">Gallery</div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <nav id="menu">
        <a class="nav-button" href="../index.html">Home</a>
        <a class="nav-button" href="../gallery.html/gallery.html">Gallery</a>
        <a class="nav-button" href="../about.html/about.html">About</a>
        <a class="nav-button" href="../contact.html/contact.html">Contact</a>
    </nav>
</header>

<script>
function toggleMenu() {
    var menu = document.getElementById("menu");
    if (menu.style.display === "flex") {
        menu.style.display = "none";
    } else {
        menu.style.display = "flex";
    }
}
</script>
