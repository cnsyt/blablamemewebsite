	<p style="color:#ffffff; font-size: 23px;">Created for demo purposes to show how to create a responsive navigation menu with a hamburger toggle for mobile devices.</p>

<script>
function toggleMenu() {
	var menu = document.getElementById("menu");
	if (menu.style.display === "flex") {
		menu.style.display = "none";
	} else {
		menu.style.display = "flex";
	}
}
</script>
